<title>Roles y Permisos — Flujo animado</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Roboto', sans-serif;
    background: transparent;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }

  .sparkle {
    position: absolute; opacity: 0;
    transform: scale(0) rotate(-90deg);
    transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .sparkle.show { opacity: 0.55; transform: scale(1) rotate(0deg); }

  .title-area { display: none; }
  .title-area h1 { display: none; }
  .title-area p { display: none; }

  .screen-frame {
    width: 678px; height: 440px;
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
    position: relative; background: #F5F6F8;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .screen-frame.transitioning {
    opacity: 0; transform: scale(0.96) translateY(6px);
  }

  .screen-scroll-wrapper {
    width: 100%; height: 100%;
    overflow: hidden; position: relative;
  }

  /* Cover mode: fills frame, no white gaps */
  .screen-img.cover-mode {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top left;
    position: absolute; top: 0; left: 0;
  }

  /* Scroll mode: for tall images that need scrolling */
  .screen-img.scroll-mode {
    width: 100%; display: block;
    position: absolute; left: 0;
    transition: top 1.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .cursor-el {
    position: absolute; z-index: 200; pointer-events: none;
    transition: left 0.75s cubic-bezier(0.4,0,0.2,1),
                top 0.75s cubic-bezier(0.4,0,0.2,1),
                transform 0.12s ease;
    filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.25));
  }
  .cursor-el.clicking { transform: scale(0.7); }

  .click-ripple {
    position: absolute; z-index: 199; pointer-events: none;
    width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid rgba(74,108,247,0.5);
    transform: translate(-50%,-50%) scale(0);
    opacity: 0;
  }
  .click-ripple.active { animation: ripple 0.5s ease-out forwards; }
  @keyframes ripple {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(2); opacity: 0; }
  }

  .progress { display: none; }
  .dot { display: none; }
  .step-label { display: none; }
</style>
</head>

gA28Bhkk6BA7fjkQAAAAASUVORK5CYII="
];

const IMG_HEIGHTS = [896, 960, 960, 1025, 1512];
const IMG_WIDTHS  = [1232, 1512, 1512, 1512, 1512];

/* Screen 4 (05.png) is the only one that scrolls.
   Screens 0-3 use object-fit:cover so image fills the frame perfectly. */
const SCROLLABLE = [false, false, false, false, true];

const SCREEN_LABELS = [
  "Roles y Permisos",
  "Información básica",
  "Asignación",
  "Permisos",
  "Revisión"
];

const FRAME_W = 620;
const FRAME_H = 440;

const FLOW = [
  // Screen 0: Roles table — cursor hovers then clicks "Crear rol personalizado"
  { s: 0, x: 85, y: 11,  dur: 2200, click: false, scroll: 0 },
  { s: 0, x: 85, y: 11,  dur: 600,  click: true,  scroll: 0 },

  // Screen 1: Info básica — name filled, move to Continuar and click
  { s: 1, x: 50, y: 38,  dur: 1800, click: false, scroll: 0 },
  { s: 1, x: 70, y: 92,  dur: 1200, click: false, scroll: 0 },
  { s: 1, x: 70, y: 92,  dur: 500,  click: true,  scroll: 0 },

  // Screen 2: Asignación — review then click Continuar
  { s: 2, x: 50, y: 28,  dur: 1600, click: false, scroll: 0 },
  { s: 2, x: 50, y: 50,  dur: 1200, click: false, scroll: 0 },
  { s: 2, x: 70, y: 92,  dur: 1000, click: false, scroll: 0 },
  { s: 2, x: 70, y: 92,  dur: 500,  click: true,  scroll: 0 },

  // Screen 3: Permisos — hover toggles then click Continuar
  { s: 3, x: 72, y: 32,  dur: 1500, click: false, scroll: 0 },
  { s: 3, x: 72, y: 50,  dur: 1200, click: false, scroll: 0 },
  { s: 3, x: 70, y: 92,  dur: 1000, click: false, scroll: 0 },
  { s: 3, x: 70, y: 92,  dur: 500,  click: true,  scroll: 0 },

  // Screen 4: Revisión — scrolls down to "Activar rol"
  { s: 4, x: 50, y: 25,  dur: 1600, click: false, scroll: 0 },
  { s: 4, x: 50, y: 40,  dur: 1400, click: false, scroll: 20 },
  { s: 4, x: 50, y: 50,  dur: 1400, click: false, scroll: 45 },
  { s: 4, x: 50, y: 55,  dur: 1400, click: false, scroll: 70 },
  { s: 4, x: 70, y: 85,  dur: 1400, click: false, scroll: 100 },
  { s: 4, x: 70, y: 85,  dur: 600,  click: true,  scroll: 100 },
  { s: 4, x: 50, y: 50,  dur: 2500, click: false, scroll: 100 },
];

const frame = document.getElementById("frame");
const img = document.getElementById("screenImg");
const cursor = document.getElementById("cursor");
const ripple = document.getElementById("ripple");
const progressEl = document.getElementById("progress");
const labelEl = document.getElementById("label");

SCREEN_LABELS.forEach(() => {
  const dot = document.createElement("div");
  dot.className = "dot";
  progressEl.appendChild(dot);
});

document.querySelectorAll(".sparkle").forEach((el, i) => {
  setTimeout(() => el.classList.add("show"), 400 + i * 250);
});

let currentStep = 0;
let currentScreen = -1;

function updateProgress(idx) {
  document.querySelectorAll(".dot").forEach((d, i) => d.classList.toggle("active", i === idx));
  labelEl.textContent = SCREEN_LABELS[idx];
}

function moveCursor(xPct, yPct) {
  cursor.style.left = (xPct / 100 * FRAME_W) + "px";
  cursor.style.top = (yPct / 100 * FRAME_H) + "px";
}

function doClick(xPct, yPct) {
  cursor.classList.add("clicking");
  ripple.style.left = (xPct / 100 * FRAME_W) + "px";
  ripple.style.top = (yPct / 100 * FRAME_H) + "px";
  ripple.classList.remove("active");
  void ripple.offsetWidth;
  ripple.classList.add("active");
  setTimeout(() => cursor.classList.remove("clicking"), 150);
}

function setImageMode(screenIdx) {
  if (SCROLLABLE[screenIdx]) {
    img.className = "screen-img scroll-mode";
    img.style.top = "0px";
  } else {
    img.className = "screen-img cover-mode";
    img.style.top = "";
  }
}

function setScroll(screenIdx, scrollPct) {
  if (!SCROLLABLE[screenIdx]) return;
  const renderedH = (FRAME_W / IMG_WIDTHS[screenIdx]) * IMG_HEIGHTS[screenIdx];
  const maxScroll = Math.max(0, renderedH - FRAME_H);
  img.style.top = -(maxScroll * scrollPct / 100) + "px";
}

function changeScreen(screenIdx) {
  if (screenIdx === currentScreen) return Promise.resolve();
  return new Promise(resolve => {
    frame.classList.add("transitioning");
    setTimeout(() => {
      // Set mode before loading image
      setImageMode(screenIdx);
      if (SCROLLABLE[screenIdx]) {
        img.style.transition = "none";
        img.style.top = "0px";
        void img.offsetWidth;
        img.style.transition = "top 1.8s cubic-bezier(0.4, 0, 0.2, 1)";
      }
      img.src = IMAGES[screenIdx];
      currentScreen = screenIdx;
      updateProgress(screenIdx);
      setTimeout(() => {
        frame.classList.remove("transitioning");
        resolve();
      }, 50);
    }, 350);
  });
}

async function runStep() {
  const step = FLOW[currentStep % FLOW.length];

  if (step.s !== currentScreen) {
    await changeScreen(step.s);
    await new Promise(r => setTimeout(r, 200));
  }

  if (SCROLLABLE[step.s]) {
    setScroll(step.s, step.scroll || 0);
  }

  moveCursor(step.x, step.y);

  if (step.click) {
    setTimeout(() => doClick(step.x, step.y), 600);
  }

  setTimeout(() => {
    currentStep = (currentStep + 1) % FLOW.length;
    if (currentStep === 0) currentScreen = -1;
    runStep();
  }, step.dur);
}

// Preload then start
let loaded = 0;
IMAGES.forEach(src => {
  const i = new Image();
  i.onload = () => { loaded++; if (loaded === IMAGES.length) start(); };
  i.src = src;
});

function start() {
  setImageMode(0);
  img.src = IMAGES[0];
  currentScreen = 0;
  updateProgress(0);
  moveCursor(50, 50);
  setTimeout(runStep, 800);
}
</script>
