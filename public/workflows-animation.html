<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflows — Flujo animado</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Roboto', sans-serif;
    background: transparent;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }

  .sparkle {
    position: absolute; opacity: 0;
    transform: scale(0) rotate(-90deg);
    transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .sparkle.show { opacity: 0.55; transform: scale(1) rotate(0deg); }

  .screen-frame {
    width: 678px; height: 440px;
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
    position: relative; background: #F5F6F8;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .screen-frame.transitioning {
    opacity: 0; transform: scale(0.96) translateY(6px);
  }

  .screen-scroll-wrapper {
    width: 100%; height: 100%;
    overflow: hidden; position: relative;
  }

  .screen-img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top left;
    position: absolute; top: 0; left: 0;
  }

  .cursor-el {
    position: absolute; z-index: 200; pointer-events: none;
    transition: left 0.75s cubic-bezier(0.4,0,0.2,1),
                top 0.75s cubic-bezier(0.4,0,0.2,1),
                transform 0.12s ease;
    filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.25));
  }
  .cursor-el.clicking { transform: scale(0.7); }

  .click-ripple {
    position: absolute; z-index: 199; pointer-events: none;
    width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid rgba(74,108,247,0.5);
    transform: translate(-50%,-50%) scale(0);
    opacity: 0;
  }
  .click-ripple.active { animation: ripple 0.5s ease-out forwards; }
  @keyframes ripple {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(2); opacity: 0; }
  }
</style>
</head>

const FRAME_H = 440;

/*

  1 - Table: hover on "+ Nuevo flujo" then click
  2 - Editor with panel: hover panel items, click Ramificación
  3 - Flow diagram: hover nodes
  4 - Complete flow with Activar: hover nodes, click Activar
  5 - Complex flow with panel: explore the final result
*/
const FLOW = [
  // Screen 0: Table "Flujos de trabajo"
  { s: 0, x: 88, y: 10,  dur: 2000, click: false },  // hover "+ Nuevo Flujo"

  { s: 0, x: 30, y: 48,  dur: 1000, click: false },  // hover another row
  { s: 0, x: 88, y: 10,  dur: 1000, click: false },  // back to button
  { s: 0, x: 88, y: 10,  dur: 500,  click: true },   // click "+ Nuevo Flujo"

  // Screen 1: Editor with side panel — adding components
  { s: 1, x: 35, y: 25,  dur: 1500, click: false },  // hover "Nueva solicitud"
  { s: 1, x: 35, y: 50,  dur: 1200, click: false },  // hover "Ramificación" node
  { s: 1, x: 80, y: 35,  dur: 1000, click: false },  // hover panel: Ramificación
  { s: 1, x: 80, y: 35,  dur: 500,  click: true },   // click Ramificación in panel
  { s: 1, x: 80, y: 55,  dur: 1000, click: false },  // hover panel: Nueva tarea
  { s: 1, x: 80, y: 55,  dur: 500,  click: true },   // click Nueva tarea

  // Screen 2: Flow diagram — branching visible
  { s: 2, x: 48, y: 15,  dur: 1500, click: false },  // hover Nueva solicitud
  { s: 2, x: 48, y: 30,  dur: 1200, click: false },  // hover Ramificación
  { s: 2, x: 30, y: 42,  dur: 1000, click: false },  // hover Rama 01
  { s: 2, x: 30, y: 56,  dur: 1200, click: false },  // hover Tarea
  { s: 2, x: 65, y: 42,  dur: 1000, click: false },  // hover Rama por defecto
  { s: 2, x: 48, y: 30,  dur: 800,  click: false },  // back to Ramificación

  // Screen 3: Complete flow — both branches with tasks
  { s: 3, x: 48, y: 15,  dur: 1500, click: false },  // hover top
  { s: 3, x: 48, y: 30,  dur: 1000, click: false },  // hover Ramificación (selected)
  { s: 3, x: 30, y: 53,  dur: 1200, click: false },  // hover left Nueva tarea
  { s: 3, x: 70, y: 53,  dur: 1200, click: false },  // hover right Nueva tarea

const frame = document.getElementById("frame");
const img = document.getElementById("screenImg");
const cursor = document.getElementById("cursor");
const ripple = document.getElementById("ripple");

document.querySelectorAll(".sparkle").forEach((el, i) => {
  setTimeout(() => el.classList.add("show"), 400 + i * 250);
});

let currentStep = 0;
let currentScreen = -1;

function moveCursor(xPct, yPct) {
  cursor.style.left = (xPct / 100 * FRAME_W) + "px";
  cursor.style.top = (yPct / 100 * FRAME_H) + "px";
}

function doClick(xPct, yPct) {
  cursor.classList.add("clicking");
  ripple.style.left = (xPct / 100 * FRAME_W) + "px";
  ripple.style.top = (yPct / 100 * FRAME_H) + "px";
  ripple.classList.remove("active");
  void ripple.offsetWidth;
  ripple.classList.add("active");
  setTimeout(() => cursor.classList.remove("clicking"), 150);
}

function changeScreen(screenIdx) {
  if (screenIdx === currentScreen) return Promise.resolve();
  return new Promise(resolve => {
    frame.classList.add("transitioning");
    setTimeout(() => {
      img.src = IMAGES[screenIdx];
      currentScreen = screenIdx;
      setTimeout(() => {
        frame.classList.remove("transitioning");
        resolve();
      }, 50);
    }, 350);
  });
}

async function runStep() {
  const step = FLOW[currentStep % FLOW.length];

  if (step.s !== currentScreen) {
    await changeScreen(step.s);
    await new Promise(r => setTimeout(r, 200));
  }

  moveCursor(step.x, step.y);

  if (step.click) {
    setTimeout(() => doClick(step.x, step.y), 600);
  }

  setTimeout(() => {
    currentStep = (currentStep + 1) % FLOW.length;
    if (currentStep === 0) currentScreen = -1;
    runStep();
  }, step.dur);
}

let loaded = 0;
IMAGES.forEach(src => {
  const i = new Image();
  i.onload = () => { loaded++; if (loaded === IMAGES.length) start(); };
  i.src = src;
});

function start() {
  img.src = IMAGES[0];
  currentScreen = 0;
  moveCursor(50, 50);
  setTimeout(runStep, 800);
}
