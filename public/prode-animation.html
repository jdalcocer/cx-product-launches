<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronósticos deportivos — Flujo animado</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Roboto', sans-serif;
    background: transparent;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }

  .sparkle {
    position: absolute; opacity: 0;
    transform: scale(0) rotate(-90deg);
    transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .sparkle.show { opacity: 0.45; transform: scale(1) rotate(0deg); }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.9) rotate(0deg); }
    50% { opacity: 0.65; transform: scale(1.1) rotate(15deg); }
  }
  .sparkle.show { animation: twinkle 3s ease-in-out infinite; }
  .sparkle:nth-child(2).show { animation-delay: 0.5s; }
  .sparkle:nth-child(3).show { animation-delay: 1s; }
  .sparkle:nth-child(4).show { animation-delay: 1.5s; }
  .sparkle:nth-child(5).show { animation-delay: 0.7s; }
  .sparkle:nth-child(6).show { animation-delay: 1.2s; }
  .sparkle:nth-child(7).show { animation-delay: 0.3s; }
  .sparkle:nth-child(8).show { animation-delay: 1.8s; }

  .screen-frame {
    width: 678px; height: 440px;
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
    position: relative; background: #F5F6F8;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .screen-frame.transitioning {
    opacity: 0; transform: scale(0.96) translateY(6px);
  }

  .screen-scroll-wrapper {
    width: 100%; height: 100%;
    overflow: hidden; position: relative;
  }

  .screen-img.cover-mode {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top left;
    position: absolute; top: 0; left: 0;
  }

  .screen-img.scroll-mode {
    width: 100%; display: block;
    position: absolute; left: 0;
    transition: top 1.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .cursor-el {
    position: absolute; z-index: 200; pointer-events: none;
    transition: left 0.75s cubic-bezier(0.4,0,0.2,1),
                top 0.75s cubic-bezier(0.4,0,0.2,1),
                transform 0.12s ease;
    filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.25));
  }
  .cursor-el.clicking { transform: scale(0.7); }

  .click-ripple {
    position: absolute; z-index: 199; pointer-events: none;
    width: 30px; height: 30px; border-radius: 50%;
    border: 2px solid rgba(74,108,247,0.5);
    transform: translate(-50%,-50%) scale(0);
    opacity: 0;
  }
  .click-ripple.active { animation: ripple 0.5s ease-out forwards; }
  @keyframes ripple {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(2); opacity: 0; }
  }
</style>
</head>

const IMG_WIDTHS  = [1512, 1512, 1512, 1512, 1512];
const IMG_HEIGHTS = [1024, 1332, 1024, 1024, 1025];
const SCROLLABLE  = [false, true, false, false, false];

const FRAME_W = 678;
const FRAME_H = 440;

const FLOW = [
  // Screen 0: Feed - hover banner prode y clickear Participar
  { s: 0, x: 20, y: 30,  dur: 1500, click: false, scroll: 0 },
  { s: 0, x: 20, y: 35,  dur: 1000, click: false, scroll: 0 },   // hover sidebar Pronósticos
  { s: 0, x: 50, y: 55,  dur: 1200, click: false, scroll: 0 },   // hover banner
  { s: 0, x: 48, y: 62,  dur: 1000, click: false, scroll: 0 },   // hover Participar
  { s: 0, x: 48, y: 62,  dur: 500,  click: true,  scroll: 0 },   // click Participar

  // Screen 1: Reglamento / Partidos
  { s: 1, x: 50, y: 10,  dur: 1400, click: false, scroll: 0 },   // hover tabs
  { s: 1, x: 45, y: 35,  dur: 1200, click: false, scroll: 0 },   // hover Pronóstico pendiente
  { s: 1, x: 50, y: 55,  dur: 1200, click: false, scroll: 30 },  // scroll a partidos
  { s: 1, x: 50, y: 55,  dur: 800,  click: true,  scroll: 30 },  // click México vs Sudáfrica

  // Screen 2: Modal vacío (loading/opening)
  { s: 2, x: 50, y: 50,  dur: 1400, click: false, scroll: 0 },

  // Screen 3: Modal con pronóstico 1-0
  { s: 3, x: 48, y: 42,  dur: 1200, click: false, scroll: 0 },   // hover + México
  { s: 3, x: 48, y: 42,  dur: 500,  click: true,  scroll: 0 },   // click +
  { s: 3, x: 58, y: 54,  dur: 1200, click: false, scroll: 0 },   // hover Sudáfrica
  { s: 3, x: 68, y: 78,  dur: 1200, click: false, scroll: 0 },   // hover Guardar pronóstico
  { s: 3, x: 68, y: 78,  dur: 500,  click: true,  scroll: 0 },   // click Guardar

  // Screen 4: Pronóstico guardado
  { s: 4, x: 50, y: 45,  dur: 1400, click: false, scroll: 0 },   // hover partido completo
  { s: 4, x: 50, y: 85,  dur: 1500, click: false, scroll: 0 },   // hover snackbar
  { s: 4, x: 50, y: 50,  dur: 2200, click: false, scroll: 0 },   // final pause
];

const frame = document.getElementById("frame");
const img = document.getElementById("screenImg");
const cursor = document.getElementById("cursor");
const ripple = document.getElementById("ripple");

document.querySelectorAll(".sparkle").forEach((el, i) => {
  setTimeout(() => el.classList.add("show"), 400 + i * 200);
});

let currentStep = 0;
let currentScreen = -1;

function moveCursor(xPct, yPct) {
  cursor.style.left = (xPct / 100 * FRAME_W) + "px";
  cursor.style.top = (yPct / 100 * FRAME_H) + "px";
}

function doClick(xPct, yPct) {
  cursor.classList.add("clicking");
  ripple.style.left = (xPct / 100 * FRAME_W) + "px";
  ripple.style.top = (yPct / 100 * FRAME_H) + "px";
  ripple.classList.remove("active");
  void ripple.offsetWidth;
  ripple.classList.add("active");
  setTimeout(() => cursor.classList.remove("clicking"), 150);
}

function setImageMode(screenIdx) {
  if (SCROLLABLE[screenIdx]) {
    img.className = "screen-img scroll-mode";
    img.style.top = "0px";
  } else {
    img.className = "screen-img cover-mode";
    img.style.top = "";
  }
}

function setScroll(screenIdx, scrollPct) {
  if (!SCROLLABLE[screenIdx]) return;
  const renderedH = (FRAME_W / IMG_WIDTHS[screenIdx]) * IMG_HEIGHTS[screenIdx];
  const maxScroll = Math.max(0, renderedH - FRAME_H);
  img.style.top = -(maxScroll * scrollPct / 100) + "px";
}

function changeScreen(screenIdx) {
  if (screenIdx === currentScreen) return Promise.resolve();
  return new Promise(resolve => {
    frame.classList.add("transitioning");
    setTimeout(() => {
      setImageMode(screenIdx);
      if (SCROLLABLE[screenIdx]) {
        img.style.transition = "none";
        img.style.top = "0px";
        void img.offsetWidth;
        img.style.transition = "top 1.8s cubic-bezier(0.4, 0, 0.2, 1)";
      }
      img.src = IMAGES[screenIdx];
      currentScreen = screenIdx;
      setTimeout(() => {
        frame.classList.remove("transitioning");
        resolve();
      }, 50);
    }, 350);
  });
}

async function runStep() {
  const step = FLOW[currentStep % FLOW.length];

  if (step.s !== currentScreen) {
    await changeScreen(step.s);
    await new Promise(r => setTimeout(r, 200));
  }

  if (SCROLLABLE[step.s]) {
    setScroll(step.s, step.scroll || 0);
  }

  moveCursor(step.x, step.y);

  if (step.click) {
    setTimeout(() => doClick(step.x, step.y), 600);
  }

  setTimeout(() => {
    currentStep = (currentStep + 1) % FLOW.length;
    if (currentStep === 0) currentScreen = -1;
    runStep();
  }, step.dur);
}

let loaded = 0;
IMAGES.forEach(src => {
  const i = new Image();
  i.onload = () => { loaded++; if (loaded === IMAGES.length) start(); };
  i.src = src;
});

function start() {
  setImageMode(0);
  img.src = IMAGES[0];
  currentScreen = 0;
  moveCursor(50, 50);
  setTimeout(runStep, 800);
}
</script>
