<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock — Flujo animado</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .sparkle {
    position: absolute; opacity: 0;
    transform: scale(0) rotate(-90deg);
    transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .sparkle.show { opacity: 0.45; transform: scale(1) rotate(0deg); }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; transform: scale(0.9) rotate(0deg); }
    50% { opacity: 0.65; transform: scale(1.1) rotate(15deg); }
  }
  .sparkle.show { animation: twinkle 3s ease-in-out infinite; }
  .sparkle:nth-child(2).show { animation-delay: 0.5s; }
  .sparkle:nth-child(3).show { animation-delay: 1s; }
  .sparkle:nth-child(4).show { animation-delay: 1.5s; }
  .sparkle:nth-child(5).show { animation-delay: 0.7s; }
  .sparkle:nth-child(6).show { animation-delay: 1.2s; }
  .sparkle:nth-child(7).show { animation-delay: 0.3s; }
  .sparkle:nth-child(8).show { animation-delay: 1.8s; }

  .phone-container { position: relative; }

  .phone-frame {
    width: 320px;
    height: 628px;
    background: #1a1a2e;
    border-radius: 50px;
    padding: 12px;
    box-shadow:
      0 50px 100px rgba(0,0,0,0.25),
      0 0 0 2px #333,
      inset 0 0 0 2px #444;
    position: relative;
  }
  .phone-frame::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 28px;
    background: #1a1a2e;
    border-radius: 0 0 20px 20px;
    z-index: 10;
  }

  .screen-frame {
    width: 100%;
    height: 100%;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    background: #F5F6F8;
  }

  .screen-img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
    position: absolute;
    left: 0; top: 0;
    transition: opacity 0.3s ease;
  }
  .screen-img.hidden { opacity: 0; }
  .screen-img.visible { opacity: 1; }

  .click-ripple {
    position: absolute; z-index: 199; pointer-events: none;
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid rgba(79, 106, 246, 0.6);
    transform: translate(-50%,-50%) scale(0);
    opacity: 0;
  }
  .click-ripple.active { animation: ripple 0.5s ease-out forwards; }
  @keyframes ripple {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(2); opacity: 0; }
  }

  .touch-indicator {
    position: absolute; z-index: 198; pointer-events: none;
    width: 50px; height: 50px; border-radius: 50%;
    background: rgba(79, 106, 246, 0.15);
    transform: translate(-50%,-50%) scale(0);
    opacity: 0;
  }
  .touch-indicator.active { animation: touch 0.4s ease-out forwards; }
  @keyframes touch {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    50% { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
    100% { transform: translate(-50%,-50%) scale(0.8); opacity: 0; }
  }

  .home-indicator {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 4px;
    border-radius: 3px;
    background: rgba(255,255,255,0.55);
  }
</style>
</head>

const FRAME_W = 296;
const FRAME_H = 604;

const FLOW = [
  // Screen 0: Apps grid - tap Marcajes
  { s: 0, x: 50, y: 12,  dur: 700,  click: false },
  { s: 0, x: 22, y: 22,  dur: 600,  click: false },
  { s: 0, x: 22, y: 22,  dur: 350, click: true  },

  // Screen 1: Reconocimiento facial intro
  { s: 1, x: 50, y: 18,  dur: 700,  click: false },
  { s: 1, x: 50, y: 38,  dur: 700,  click: false },
  { s: 1, x: 50, y: 88,  dur: 600,  click: false },
  { s: 1, x: 50, y: 88,  dur: 350, click: true  },

  // Screen 2: Permiso de cámara
  { s: 2, x: 50, y: 50,  dur: 800,  click: false },
  { s: 2, x: 50, y: 56,  dur: 600,  click: false },
  { s: 2, x: 50, y: 56,  dur: 350, click: true  },

  // Screen 3: Captura facial
  { s: 3, x: 50, y: 40,  dur: 800,  click: false },
  { s: 3, x: 50, y: 78,  dur: 700,  click: false },

  // Screen 4: Reloj checador 00h 00m - tap play
  { s: 4, x: 50, y: 38,  dur: 700,  click: false },
  { s: 4, x: 78, y: 50,  dur: 600,  click: false },
  { s: 4, x: 78, y: 50,  dur: 350, click: true  },

  // Screen 5: Reloj checador en curso 00h 01m
  { s: 5, x: 35, y: 50,  dur: 700,  click: false },
  { s: 5, x: 50, y: 76,  dur: 700,  click: false },
  { s: 5, x: 50, y: 50,  dur: 1300, click: false },
];

const frame = document.getElementById("frame");
const imgA = document.getElementById("imgA");
const imgB = document.getElementById("imgB");
const touch = document.getElementById("touch");
const ripple = document.getElementById("ripple");

let frontImg = imgA;
let backImg = imgB;

document.querySelectorAll(".sparkle").forEach((el, i) => {
  setTimeout(() => el.classList.add("show"), 400 + i * 200);
});

let currentStep = 0;
let currentScreen = -1;

function doClick(xPct, yPct) {
  const x = (xPct / 100 * FRAME_W);
  const y = (yPct / 100 * FRAME_H);
  touch.style.left = x + "px"; touch.style.top = y + "px";
  touch.classList.remove("active"); void touch.offsetWidth; touch.classList.add("active");
  ripple.style.left = x + "px"; ripple.style.top = y + "px";
  ripple.classList.remove("active"); void ripple.offsetWidth; ripple.classList.add("active");
}

function changeScreen(screenIdx) {
  if (screenIdx === currentScreen) return Promise.resolve();
  return new Promise(resolve => {
    backImg.src = IMAGES[screenIdx];
    backImg.onload = () => {
      backImg.classList.remove("hidden");
      backImg.classList.add("visible");
      frontImg.classList.remove("visible");
      frontImg.classList.add("hidden");
      const tmp = frontImg;
      frontImg = backImg;
      backImg = tmp;
      currentScreen = screenIdx;
      setTimeout(resolve, 300);
    };
  });
}

async function runStep() {
  const step = FLOW[currentStep % FLOW.length];
  if (step.s !== currentScreen) {
    await changeScreen(step.s);
  }
  if (step.click) setTimeout(() => doClick(step.x, step.y), 350);
  setTimeout(() => {
    currentStep = (currentStep + 1) % FLOW.length;
    if (currentStep === 0) currentScreen = -1;
    runStep();
  }, step.dur);
}

let loaded = 0;
IMAGES.forEach(src => {
  const i = new Image();
  i.onload = () => { loaded++; if (loaded === IMAGES.length) start(); };
  i.onerror = () => { loaded++; if (loaded === IMAGES.length) start(); };
  i.src = src;
});
function start() {
  imgA.src = IMAGES[0];
  currentScreen = 0;
  setTimeout(runStep, 500);
}
</script>
