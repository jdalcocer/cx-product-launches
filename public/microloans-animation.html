<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adelanto de Sueldo — Flujo animado</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    overflow: hidden;
    position: relative;
  }

  .sparkle {
    position: absolute; opacity: 0;
    transform: scale(0) rotate(-90deg);
    transition: all 0.6s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 1;
  }
  .sparkle.show { opacity: 0.55; transform: scale(1) rotate(0deg); }
  @keyframes twinkle {
    0%, 100% { opacity: 0.35; transform: scale(0.9) rotate(0deg); }
    50% { opacity: 0.7; transform: scale(1.1) rotate(15deg); }
  }
  .sparkle.show { animation: twinkle 3s ease-in-out infinite; }
  .sparkle:nth-child(2).show { animation-delay: 0.5s; }
  .sparkle:nth-child(3).show { animation-delay: 1s; }
  .sparkle:nth-child(4).show { animation-delay: 1.5s; }
  .sparkle:nth-child(5).show { animation-delay: 0.7s; }
  .sparkle:nth-child(6).show { animation-delay: 1.2s; }
  .sparkle:nth-child(7).show { animation-delay: 0.3s; }
  .sparkle:nth-child(8).show { animation-delay: 1.8s; }

  .phone-container {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(1);
    transform-origin: center center;
  }

  .phone-frame {
    width: 320px;
    height: 692px;
    background: #1a1a2e;
    border-radius: 50px;
    padding: 12px;
    border: 2px solid #2a2a3e;
    position: relative;
  }

  .screen-frame {
    width: 100%;
    height: 100%;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    background: #F5F6F8;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  /* White overlay to hide the app footer/nav */
  .screen-frame::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 95px;
    background: #ffffff;
    z-index: 5;
    pointer-events: none;
  }

  .screen-frame.transitioning {
    opacity: 0;
    transform: scale(0.96) translateY(6px);
  }

  .screen-scroll-wrapper {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
  }

  .screen-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    position: absolute;
    top: 0;
    left: 0;
  }

  .click-ripple {
    position: absolute;
    z-index: 199;
    pointer-events: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 3px solid rgba(79, 106, 246, 0.6);
    transform: translate(-50%,-50%) scale(0);
    opacity: 0;
  }
  .click-ripple.active { animation: ripple 0.5s ease-out forwards; }
  @keyframes ripple {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(2); opacity: 0; }
  }

  .touch-indicator {
    position: absolute;
    z-index: 198;
    pointer-events: none;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: rgba(79, 106, 246, 0.15);
    transform: translate(-50%,-50%) scale(0);
    opacity: 0;
  }
  .touch-indicator.active { animation: touch 0.4s ease-out forwards; }
  @keyframes touch {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    50% { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
    100% { transform: translate(-50%,-50%) scale(0.8); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Sparkles -->
<svg class="sparkle" style="left:8%;top:10%" width="20" height="20" viewBox="0 0 20 20"><path d="M10 0L12 8L20 10L12 12L10 20L8 12L0 10L8 8L10 0Z" fill="#ffffff"></path></svg>
<svg class="sparkle" style="right:8%;top:8%" width="14" height="14" viewBox="0 0 20 20"><path d="M10 0L12 8L20 10L12 12L10 20L8 12L0 10L8 8L10 0Z" fill="#ffffff"></path></svg>
<svg class="sparkle" style="left:5%;bottom:18%" width="16" height="16" viewBox="0 0 20 20"><path d="M10 0L12 8L20 10L12 12L10 20L8 12L0 10L8 8L10 0Z" fill="#ffffff"></path></svg>
<svg class="sparkle" style="right:6%;bottom:15%" width="18" height="18" viewBox="0 0 20 20"><path d="M10 0L12 8L20 10L12 12L10 20L8 12L0 10L8 8L10 0Z" fill="#ffffff"></path></svg>
<svg class="sparkle" style="left:12%;top:45%" width="12" height="12" viewBox="0 0 20 20"><path d="M10 0L12 8L20 10L12 12L10 20L8 12L0 10L8 8L10 0Z" fill="#ffffff"></path></svg>
<svg class="sparkle" style="right:10%;top:42%" width="12" height="12" viewBox="0 0 20 20"><path d="M10 0L12 8L20 10L12 12L10 20L8 12L0 10L8 8L10 0Z" fill="#ffffff"></path></svg>
<svg class="sparkle" style="left:18%;bottom:32%" width="10" height="10" viewBox="0 0 20 20"><path d="M10 0L12 8L20 10L12 12L10 20L8 12L0 10L8 8L10 0Z" fill="#ffffff"></path></svg>
<svg class="sparkle" style="right:16%;bottom:30%" width="10" height="10" viewBox="0 0 20 20"><path d="M10 0L12 8L20 10L12 12L10 20L8 12L0 10L8 8L10 0Z" fill="#ffffff"></path></svg>

<div class="phone-container">
  <div class="phone-frame">
    <div class="screen-frame" id="frame">
      <div class="screen-scroll-wrapper">
        <img class="screen-img" id="screenImg" alt="Screen" src="">
      </div>
      <div class="touch-indicator" id="touch"></div>
      <div class="click-ripple" id="ripple"></div>
    </div>
  </div>
</div>

<script>
const IMAGES = [
  "https://hebbkx1anhila5yf.public.blob.vercel-storage.com/IMG_8870-dCf4TAET8FQSE2obPiflYKSa9tL2LK.png",
  "https://hebbkx1anhila5yf.public.blob.vercel-storage.com/IMG_8871-VHMH7TZGGKrKcLP5jf2uvR2oY9sCfx.png",
  "https://hebbkx1anhila5yf.public.blob.vercel-storage.com/IMG_8872-ASldkg5IrYKWSILv9U6oCkNzK4BqV4.png",
  "https://hebbkx1anhila5yf.public.blob.vercel-storage.com/IMG_8873-PzMPzPcjtYCHuFxiZBKkxHUAU1J60B.png",
  "https://hebbkx1anhila5yf.public.blob.vercel-storage.com/IMG_8874-WquxkDtmTbNVHRkIlrCi4sfBE0X7PI.png",
  "https://hebbkx1anhila5yf.public.blob.vercel-storage.com/IMG_8875-4GDFFfOImKOOeeCApCiNcifRkCdtso.png",
];

const FRAME_W = 296;
const FRAME_H = 668;

const FLOW = [
  { s: 0, x: 50, y: 30,  dur: 1500, click: false },
  { s: 0, x: 50, y: 25,  dur: 1200, click: false },
  { s: 0, x: 50, y: 25,  dur: 600,  click: true  },

  { s: 1, x: 50, y: 35,  dur: 1500, click: false },
  { s: 1, x: 35, y: 52,  dur: 1000, click: false },
  { s: 1, x: 50, y: 90,  dur: 1000, click: false },
  { s: 1, x: 50, y: 90,  dur: 500,  click: true  },

  { s: 2, x: 50, y: 30,  dur: 1500, click: false },
  { s: 2, x: 50, y: 38,  dur: 1000, click: false },
  { s: 2, x: 50, y: 38,  dur: 500,  click: true  },
  { s: 2, x: 50, y: 90,  dur: 1000, click: false },
  { s: 2, x: 50, y: 90,  dur: 500,  click: true  },

  { s: 3, x: 50, y: 28,  dur: 1500, click: false },
  { s: 3, x: 50, y: 45,  dur: 1200, click: false },
  { s: 3, x: 50, y: 60,  dur: 1000, click: false },
  { s: 3, x: 50, y: 75,  dur: 1000, click: false },

  { s: 4, x: 50, y: 35,  dur: 1500, click: false },
  { s: 4, x: 50, y: 50,  dur: 1200, click: false },
  { s: 4, x: 50, y: 65,  dur: 1000, click: false },
  { s: 4, x: 50, y: 85,  dur: 1000, click: false },
  { s: 4, x: 50, y: 85,  dur: 500,  click: true  },

  { s: 5, x: 50, y: 30,  dur: 1500, click: false },
  { s: 5, x: 50, y: 40,  dur: 1200, click: false },
  { s: 5, x: 50, y: 60,  dur: 1500, click: false },
  { s: 5, x: 50, y: 50,  dur: 2500, click: false },
];

const frame = document.getElementById("frame");
const img = document.getElementById("screenImg");
const touch = document.getElementById("touch");
const ripple = document.getElementById("ripple");
const phoneContainer = document.querySelector(".phone-container");

// Auto-scale phone to fit viewport (accounting for border)
function fitPhone() {
  const s = Math.min(window.innerWidth / 330, window.innerHeight / 702);
  phoneContainer.style.transform = `translate(-50%, -50%) scale(${s})`;
}
fitPhone();
window.addEventListener("resize", fitPhone);

// Show sparkles
document.querySelectorAll(".sparkle").forEach((el, i) => {
  setTimeout(() => el.classList.add("show"), 400 + i * 200);
});

let currentStep = 0;
let currentScreen = -1;

function doClick(xPct, yPct) {
  const x = (xPct / 100 * FRAME_W);
  const y = (yPct / 100 * FRAME_H);
  touch.style.left = x + "px";
  touch.style.top = y + "px";
  touch.classList.remove("active");
  void touch.offsetWidth;
  touch.classList.add("active");
  ripple.style.left = x + "px";
  ripple.style.top = y + "px";
  ripple.classList.remove("active");
  void ripple.offsetWidth;
  ripple.classList.add("active");
}

function changeScreen(screenIdx) {
  if (screenIdx === currentScreen) return Promise.resolve();
  return new Promise(resolve => {
    frame.classList.add("transitioning");
    setTimeout(() => {
      img.src = IMAGES[screenIdx];
      currentScreen = screenIdx;
      setTimeout(() => {
        frame.classList.remove("transitioning");
        resolve();
      }, 50);
    }, 350);
  });
}

async function runStep() {
  const step = FLOW[currentStep % FLOW.length];
  if (step.s !== currentScreen) {
    await changeScreen(step.s);
    await new Promise(r => setTimeout(r, 200));
  }
  if (step.click) {
    setTimeout(() => doClick(step.x, step.y), 400);
  }
  setTimeout(() => {
    currentStep = (currentStep + 1) % FLOW.length;
    if (currentStep === 0) currentScreen = -1;
    runStep();
  }, step.dur);
}

let loaded = 0;
IMAGES.forEach(src => {
  const i = new Image();
  i.onload = () => { loaded++; if (loaded === IMAGES.length) start(); };
  i.onerror = () => { loaded++; if (loaded === IMAGES.length) start(); };
  i.src = src;
});

function start() {
  img.src = IMAGES[0];
  currentScreen = 0;
  setTimeout(runStep, 800);
}
</script>
</body>
</html>
